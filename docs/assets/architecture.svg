<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <filter id="card" x="-6%" y="-6%" width="112%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#211F1B" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8A857A"/>
    </marker>
    <marker id="arrowRust" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#EB4A26"/>
    </marker>
    <marker id="arrowQwen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7C5CFF"/>
    </marker>
  </defs>

  <!-- paper background -->
  <rect width="1280" height="720" fill="#F4F1E9"/>

  <!-- header -->
  <text x="64" y="56" font-family="Georgia, 'Times New Roman', serif" font-size="31" fill="#211F1B">Kredex — System Architecture</text>
  <rect x="66" y="66" width="46" height="3" fill="#EB4A26"/>
  <text x="64" y="90" font-size="14.5" fill="#6E6A61">AI financial autopilot for African small businesses · deployed on Alibaba Cloud · powered by Qwen</text>
  <line x1="64" y1="108" x2="1216" y2="108" stroke="#E0DACB" stroke-width="1"/>

  <!-- ===================== CLIENT ===================== -->
  <g filter="url(#card)">
    <rect x="56" y="206" width="230" height="150" rx="16" fill="#FFFFFF" stroke="#E0DACB"/>
  </g>
  <rect x="80" y="228" width="30" height="30" rx="8" fill="#EB4A26"/>
  <text x="95" y="248" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">◧</text>
  <text x="122" y="242" font-size="16" font-weight="600" fill="#211F1B">Shop owner</text>
  <text x="122" y="260" font-size="11" fill="#6E6A61" font-family="ui-monospace, Menlo, monospace">browser · mobile web</text>
  <text x="80" y="290" font-size="12.5" fill="#211F1B">React 19 + Vite SPA</text>
  <text x="80" y="312" font-size="12" fill="#6E6A61">chat · voice · receipt photos</text>
  <text x="80" y="332" font-size="12" fill="#6E6A61">English / Nigerian Pidgin</text>

  <!-- client -> caddy arrow -->
  <line x1="286" y1="270" x2="356" y2="270" stroke="#8A857A" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="321" y="261" font-size="10.5" fill="#6E6A61" font-family="ui-monospace, Menlo, monospace" text-anchor="middle">HTTPS</text>
  <text x="321" y="288" font-size="9.5" fill="#9A958A" font-family="ui-monospace, Menlo, monospace" text-anchor="middle">kredex.xyz</text>

  <!-- ===================== ALIBABA CLOUD BOX ===================== -->
  <rect x="360" y="150" width="520" height="500" rx="20" fill="#FCF7F0" stroke="#E0864B" stroke-width="1.5"/>
  <text x="384" y="182" font-size="12" font-weight="700" fill="#B5540E" font-family="ui-monospace, Menlo, monospace" letter-spacing="1.5">ALIBABA CLOUD</text>
  <text x="384" y="202" font-size="12.5" fill="#8A857A">Simple Application Server · Singapore · Docker Compose · TLS via Let's Encrypt</text>

  <!-- Caddy -->
  <g filter="url(#card)"><rect x="392" y="228" width="456" height="80" rx="14" fill="#FFFFFF" stroke="#E4DED0"/></g>
  <rect x="410" y="252" width="30" height="30" rx="8" fill="#2E9C6E"/>
  <text x="425" y="272" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">C</text>
  <text x="454" y="262" font-size="15.5" font-weight="600" fill="#211F1B">Caddy</text>
  <text x="454" y="285" font-size="11" fill="#6E6A61" font-family="ui-monospace, Menlo, monospace">HTTPS termination · auto-renewing certs · :80 / :443</text>

  <!-- arrow caddy -> nginx -->
  <line x1="620" y1="308" x2="620" y2="336" stroke="#8A857A" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="632" y="326" font-size="10" fill="#9A958A" font-family="ui-monospace, Menlo, monospace">reverse_proxy</text>

  <!-- nginx -->
  <g filter="url(#card)"><rect x="392" y="336" width="456" height="80" rx="14" fill="#FFFFFF" stroke="#E4DED0"/></g>
  <rect x="410" y="360" width="30" height="30" rx="8" fill="#0E9C5A"/>
  <text x="425" y="380" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">N</text>
  <text x="454" y="370" font-size="15.5" font-weight="600" fill="#211F1B">nginx  ·  web</text>
  <text x="454" y="393" font-size="11" fill="#6E6A61" font-family="ui-monospace, Menlo, monospace">serves React build · proxies /api · SSE-safe (no buffering)</text>

  <!-- arrow nginx -> server -->
  <line x1="620" y1="416" x2="620" y2="444" stroke="#8A857A" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="632" y="434" font-size="10" fill="#9A958A" font-family="ui-monospace, Menlo, monospace">/api · REST + SSE</text>

  <!-- server -->
  <g filter="url(#card)"><rect x="392" y="444" width="456" height="108" rx="14" fill="#FFFFFF" stroke="#EEC9BB"/></g>
  <rect x="410" y="466" width="30" height="30" rx="8" fill="#EB4A26"/>
  <text x="425" y="486" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">E</text>
  <text x="454" y="476" font-size="15.5" font-weight="600" fill="#211F1B">Express server</text>
  <text x="454" y="497" font-size="11" fill="#6E6A61" font-family="ui-monospace, Menlo, monospace">:3001 · Node + TypeScript</text>
  <text x="454" y="522" font-size="11.5" font-weight="600" fill="#B5540E" font-family="ui-monospace, Menlo, monospace">agent (Qwen tool-calling) · semantic memory · autopilot runs</text>
  <text x="454" y="540" font-size="11" fill="#6E6A61" font-family="ui-monospace, Menlo, monospace">classifier → orchestrator → tools · recall/remember · scanners</text>

  <!-- arrow server -> mongo -->
  <line x1="620" y1="552" x2="620" y2="580" stroke="#8A857A" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="632" y="570" font-size="10" fill="#9A958A" font-family="ui-monospace, Menlo, monospace">Mongoose</text>

  <!-- mongo -->
  <g filter="url(#card)"><rect x="392" y="580" width="456" height="60" rx="14" fill="#FFFFFF" stroke="#E4DED0"/></g>
  <rect x="410" y="594" width="30" height="30" rx="8" fill="#10A050"/>
  <text x="425" y="614" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">M</text>
  <text x="454" y="605" font-size="15.5" font-weight="600" fill="#211F1B">MongoDB</text>
  <text x="454" y="625" font-size="11" fill="#6E6A61" font-family="ui-monospace, Menlo, monospace">11 collections + embeddings · persistent volume</text>

  <!-- ===================== QWEN CLOUD ===================== -->
  <rect x="920" y="360" width="296" height="236" rx="20" fill="#F1EDFF" stroke="#7C5CFF" stroke-width="1.5"/>
  <text x="944" y="392" font-size="12" font-weight="700" fill="#4B37B0" font-family="ui-monospace, Menlo, monospace" letter-spacing="1.5">QWEN CLOUD</text>
  <text x="944" y="411" font-size="11.5" fill="#8A857A">Alibaba Model Studio · DashScope</text>
  <line x1="944" y1="422" x2="1192" y2="422" stroke="#D9CFFB" stroke-width="1"/>

  <!-- model rows -->
  <g font-family="ui-monospace, Menlo, monospace">
    <text x="944" y="444" font-size="11" fill="#211F1B">qwen3.7-max</text><text x="1192" y="444" font-size="10.5" fill="#6E6A61" text-anchor="end">P&amp;L reasoning</text>
    <text x="944" y="466" font-size="11" fill="#211F1B">qwen3.5-flash</text><text x="1192" y="466" font-size="10.5" fill="#6E6A61" text-anchor="end">chat &amp; tools</text>
    <text x="944" y="488" font-size="11" fill="#211F1B">qwen-vl-max</text><text x="1192" y="488" font-size="10.5" fill="#6E6A61" text-anchor="end">receipt OCR</text>
    <text x="944" y="510" font-size="11" fill="#211F1B">qwen3-asr-flash</text><text x="1192" y="510" font-size="10.5" fill="#6E6A61" text-anchor="end">speech → text</text>
    <text x="944" y="532" font-size="11" fill="#211F1B">qwen3-tts-flash</text><text x="1192" y="532" font-size="10.5" fill="#6E6A61" text-anchor="end">text → speech</text>
    <text x="944" y="554" font-size="11" fill="#211F1B">text-embedding-v4</text><text x="1192" y="554" font-size="10.5" fill="#6E6A61" text-anchor="end">semantic memory</text>
  </g>
  <text x="944" y="578" font-size="10" fill="#9A958A">OpenAI-compatible SDK · one client, seven models</text>

  <!-- server <-> qwen arrow -->
  <line x1="848" y1="486" x2="918" y2="452" stroke="#7C5CFF" stroke-width="1.8" marker-start="url(#arrowQwen)" marker-end="url(#arrowQwen)"/>
  <text x="883" y="440" font-size="10.5" fill="#4B37B0" font-family="ui-monospace, Menlo, monospace" text-anchor="middle">AI calls</text>
  <text x="883" y="500" font-size="9.5" fill="#9A958A" font-family="ui-monospace, Menlo, monospace" text-anchor="middle">chat·vision·voice·embed</text>

  <!-- ===================== FOOTER ===================== -->
  <line x1="64" y1="672" x2="1216" y2="672" stroke="#E0DACB" stroke-width="1"/>
  <text x="64" y="697" font-size="12" fill="#6E6A61">
    <tspan font-weight="600" fill="#211F1B">Request path:</tspan> Browser —HTTPS→ Caddy —reverse_proxy→ nginx —/api (REST + SSE)→ Express —Mongoose→ MongoDB.
    <tspan fill="#4B37B0">  Express ⇄ Qwen Cloud for every AI call.</tspan>
  </text>
</svg>
