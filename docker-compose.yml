# Kredex — all-in-one deployment stack for a single Alibaba Cloud VM.
#   caddy  → HTTPS termination + auto Let's Encrypt certs (ports 80/443)
#   web    → nginx serving the React build + reverse-proxying /api
#   server → Express API (agent, long-term memory engine)
#   mongo  → MongoDB with a persistent named volume
#
# Usage on the VM:
#   cp .env.example .env   # fill in QWEN_API_KEY + JWT_SECRET
#   docker compose up -d --build
#
# HTTPS: point kredex.xyz's DNS at this server BEFORE deploying caddy, so
# Let's Encrypt can validate the domain. Caddy then obtains + renews certs
# automatically. The domain served is set in ./Caddyfile.

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    # not published to the host — only reachable inside the compose network

  server:
    build: ./server
    restart: unless-stopped
    environment:
      QWEN_API_KEY: ${QWEN_API_KEY:?set QWEN_API_KEY in .env}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      MONGODB_URI: mongodb://mongo:27017/kredex
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      PORT: "3001"
      NODE_ENV: production
    depends_on:
      - mongo

  web:
    build: ./client
    restart: unless-stopped
    # In production, Caddy is the public entry point (80/443). This binding is
    # loopback-only — private on the server, but it lets you reach the app
    # directly at http://localhost:8080 when running the stack locally.
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - server

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  mongo_data:
  caddy_data:
  caddy_config:
