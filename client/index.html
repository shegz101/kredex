<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23EB4A26'/%3E%3Ctext x='16' y='23' font-family='Arial,Helvetica,sans-serif' font-size='20' font-weight='700' fill='white' text-anchor='middle'%3EK%3C/text%3E%3C/svg%3E"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Editorial "Ledger Gazette" type: Fraunces (display serif) + JetBrains Mono (labels) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="Kredex — Know what you're owed. Know your business. An AI financial operating system for small businesses in emerging markets."
    />
    <title>Kredex — Know what you're owed. Know your business.</title>
    <script>
      // Apply theme before paint to avoid a flash. A ?theme=dark|light URL param
      // overrides the saved preference (handy for previews); otherwise use storage.
      try {
        var forced = new URLSearchParams(location.search).get('theme')
        var saved = localStorage.getItem('kredex-theme')
        if (forced === 'dark' || (forced !== 'light' && saved === 'dark')) {
          document.documentElement.classList.add('dark')
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
