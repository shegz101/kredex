server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # receipt photos (12MB) and voice clips (15MB) pass through nginx
    client_max_body_size 16m;

    # API → Express backend (service name "server" on the compose network)
    location /api/ {
        proxy_pass http://server:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (streamed chat): never buffer, keep the connection open
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
    }

    # SPA fallback — every non-file route serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
